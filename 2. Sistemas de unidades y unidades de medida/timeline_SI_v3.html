<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evolución del SI – Línea del Tiempo</title>
<style>
/* ── RESET & VARS ── */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#030c18;
  --card:#071a2e;
  --card2:#0a2240;
  --teal:#00d4f5;
  --gold:#ffc642;
  --white:#def0fa;
  --gray:#5a88a8;
  --dim:#122840;
}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--white);
  font-family:Georgia,'Times New Roman',serif;
  overflow-x:hidden;
  line-height:1.6;
}

/* ── PARTICLES ── */
#cvs{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── PROGRESS ── */
#pb{
  position:fixed;top:0;left:0;height:3px;width:0%;
  background:linear-gradient(90deg,var(--teal),#f72585);
  z-index:999;box-shadow:0 0 8px var(--teal);
  transition:width .1s linear;
}

/* ── NAV DOTS ── */
#ndots{
  position:fixed;right:18px;top:50%;transform:translateY(-50%);
  z-index:400;display:flex;flex-direction:column;gap:10px;
}
.nd{
  width:10px;height:10px;border-radius:50%;
  background:var(--dim);border:2px solid var(--dim);
  cursor:pointer;transition:all .3s;position:relative;
}
.nd:hover::after,.nd.on::after{
  content:attr(data-y);position:absolute;right:18px;top:50%;
  transform:translateY(-50%);font-size:11px;font-family:Georgia,serif;
  color:var(--gold);white-space:nowrap;pointer-events:none;
  text-shadow:0 0 8px rgba(0,0,0,.9);
}
.nd.on{transform:scale(1.4);}

/* ── HEADER ── */
header{
  position:relative;z-index:10;
  text-align:center;padding:5rem 2rem 2.5rem;
}
.eyebrow{
  font-family:'Courier New',monospace;font-size:.75rem;
  letter-spacing:.4em;color:var(--teal);text-transform:uppercase;
  opacity:0;animation:up .6s .2s ease forwards;
}
header h1{
  font-size:clamp(2rem,5vw,3.8rem);font-weight:700;
  line-height:1.15;margin-top:.8rem;
  opacity:0;animation:up .7s .45s ease forwards;
}
header h1 b{color:var(--teal);}
.hsub{
  margin-top:.7rem;font-size:1rem;color:var(--gray);
  letter-spacing:.12em;font-family:'Courier New',monospace;
  opacity:0;animation:up .6s .7s ease forwards;
}
.hline{
  width:160px;height:1px;margin:1.5rem auto 0;
  background:linear-gradient(90deg,transparent,var(--teal),transparent);
  opacity:0;animation:fi .8s .9s forwards;
}

/* ── ERA FILTERS ── */
.filters{
  display:flex;flex-wrap:wrap;justify-content:center;gap:.5rem;
  margin-top:1.8rem;
  opacity:0;animation:up .6s 1.1s ease forwards;
}
.fp{
  font-family:'Courier New',monospace;font-size:.72rem;font-weight:700;
  letter-spacing:.15em;text-transform:uppercase;
  padding:.3rem .9rem;border-radius:2px;border:1.5px solid var(--dim);
  cursor:pointer;transition:all .2s;background:transparent;color:var(--gray);
}
.fp:hover{border-color:var(--teal);color:var(--white);}
.fp.act{color:#030c18;}

/* ── TIMELINE SHELL ── */
.tl{
  position:relative;z-index:10;
  max-width:960px;margin:4rem auto 6rem;padding:0 1.5rem;
}
.spine{
  position:absolute;left:50%;transform:translateX(-50%);
  top:0;bottom:0;width:2px;background:var(--dim);
}
.sfill{
  position:absolute;left:50%;transform:translateX(-50%);
  top:0;width:2px;height:0;
  background:linear-gradient(180deg,var(--teal),#f72585);
  box-shadow:0 0 12px var(--teal);z-index:2;
  transition:height .5s ease;
}

/* ── EVENT ROW ── */
.ev{
  display:grid;
  grid-template-columns:1fr 60px 1fr;
  margin-bottom:3.5rem;
  opacity:0;transform:translateY(36px);
  transition:opacity .55s ease,transform .55s ease;
}
.ev.vis{opacity:1;transform:translateY(0);}

.ev:nth-child(odd)  .cside{grid-column:1;justify-self:end;padding-right:1.5rem;}
.ev:nth-child(odd)  .emp  {grid-column:3;}
.ev:nth-child(even) .cside{grid-column:3;justify-self:start;padding-left:1.5rem;}
.ev:nth-child(even) .emp  {grid-column:1;}
.dcol{grid-column:2;display:flex;justify-content:center;padding-top:20px;}

/* ── CARD ── */
.cside{width:100%;max-width:400px;}
.card{
  background:var(--card);
  border:1px solid rgba(255,255,255,.06);
  border-radius:4px;overflow:hidden;cursor:pointer;
  transition:transform .3s,box-shadow .3s,border-color .3s;
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 22px 48px rgba(0,0,0,.7),0 0 28px rgba(0,212,245,.1);
  border-color:rgba(0,212,245,.25);
}

/* SVG illustration */
.ill{width:100%;height:150px;display:block;overflow:hidden;}

.cacc{height:3px;width:100%;}

.cbody{padding:1.1rem 1.3rem 1.2rem;}
.yrow{display:flex;align-items:center;gap:.6rem;margin-bottom:.45rem;}
.yr{font-family:'Courier New',monospace;font-size:1rem;font-weight:700;color:var(--gold);}
.chip{
  font-family:'Courier New',monospace;font-size:.62rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  padding:.15rem .55rem;border-radius:2px;color:#030c18;
}
.ctitle{font-size:1rem;font-weight:700;line-height:1.3;margin-bottom:.4rem;}
.cdesc{font-size:.85rem;color:var(--gray);line-height:1.6;}
.more{
  display:inline-flex;align-items:center;gap:.3rem;margin-top:.7rem;
  font-family:'Courier New',monospace;font-size:.68rem;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;opacity:.45;
  transition:opacity .2s;
}
.card:hover .more{opacity:1;}
.arr{display:inline-block;transition:transform .25s;}
.card:hover .arr{transform:translateX(4px);}

/* ── DOT ── */
.dot{
  width:18px;height:18px;border-radius:50%;
  border:2px solid var(--dim);background:var(--bg);
  position:relative;z-index:3;
  transition:all .45s;
}
.ev.vis .dot{box-shadow:0 0 14px var(--dc),0 0 30px rgba(0,212,245,.25);}
.dot::before{
  content:'';position:absolute;inset:-9px;border-radius:50%;
  border:1.5px solid var(--dc,var(--teal));opacity:0;
}
.ev.vis .dot::before{animation:ring 2.6s 1s ease infinite;}

/* ── MODAL ── */
#mbg{
  position:fixed;inset:0;
  background:rgba(3,12,24,.88);backdrop-filter:blur(10px);
  z-index:800;display:flex;align-items:center;justify-content:center;
  padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .3s;
}
#mbg.open{opacity:1;pointer-events:all;}
#modal{
  background:var(--card2);
  border:1px solid rgba(0,212,245,.18);border-radius:6px;
  max-width:660px;width:100%;max-height:90vh;overflow-y:auto;
  transform:scale(.92) translateY(24px);
  transition:transform .38s cubic-bezier(.34,1.4,.64,1);
  scrollbar-width:thin;scrollbar-color:var(--teal) var(--card);
}
#mbg.open #modal{transform:scale(1) translateY(0);}
#mill{width:100%;height:200px;display:block;}
.macc{height:3px;}
.mbody{padding:1.8rem 2rem 1rem;}
.myrow{display:flex;align-items:center;gap:.8rem;margin-bottom:.6rem;}
.myr{font-family:'Courier New',monospace;font-size:1.5rem;font-weight:700;color:var(--gold);}
#mtitle{font-size:1.35rem;font-weight:700;line-height:1.3;margin-bottom:.9rem;}
#mtext{font-family:Georgia,serif;font-size:.9rem;color:var(--gray);line-height:1.75;}
#mtext p{margin-bottom:.8rem;}
#mtext strong{color:var(--white);font-weight:600;}
#mtext ul{padding-left:1.2rem;margin-bottom:.8rem;}
#mtext li{margin-bottom:.4rem;}
#mtext .highlight{
  border-left:3px solid var(--teal);padding:.6rem 1rem;
  margin:1rem 0;color:var(--white);font-size:.92rem;
  background:rgba(0,212,245,.06);border-radius:0 3px 3px 0;
}
.mfoot{
  position:sticky;bottom:0;
  background:var(--card2);border-top:1px solid rgba(255,255,255,.06);
  padding:.9rem 2rem;display:flex;justify-content:flex-end;
}
.cbtn{
  font-family:'Courier New',monospace;font-size:.78rem;font-weight:700;
  letter-spacing:.15em;text-transform:uppercase;
  color:var(--teal);background:none;
  border:1.5px solid var(--teal);padding:.4rem 1.2rem;
  border-radius:3px;cursor:pointer;transition:all .2s;
}
.cbtn:hover{background:var(--teal);color:#030c18;}

/* ── FOOTER ── */
footer{
  position:relative;z-index:10;text-align:center;
  padding:2rem 1rem 3rem;
  font-family:'Courier New',monospace;font-size:.75rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--dim);
}
footer b{color:var(--teal);}

/* ── KEYFRAMES ── */
@keyframes up{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes fi{to{opacity:1;}}
@keyframes ring{
  0%{transform:scale(1);opacity:.65;}
  70%{transform:scale(2.5);opacity:0;}
  100%{transform:scale(2.5);opacity:0;}
}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .ev{grid-template-columns:36px 1fr;}
  .ev:nth-child(odd) .cside,
  .ev:nth-child(even) .cside{grid-column:2;justify-self:start;padding:0;}
  .dcol{grid-column:1;padding-top:20px;}
  .emp{display:none;}
  .spine,.sfill{left:18px;}
  #ndots{display:none;}
  .ill,.mill{height:120px;}
}
</style>
</head>

<footer><b>Sistema Internacional de Unidades</b> · Metrología y Medición · CORHUILA</footer>

  d.addEventListener('click',()=>{
    document.getElementById('ev-'+ev.id).scrollIntoView({behavior:'smooth',block:'center'});
  });
  ndots.appendChild(d);
});

// ═══════════════════════════════════════════
// INTERSECTION OBSERVER
// ═══════════════════════════════════════════
const sf = document.getElementById('sf');

const io = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){ e.target.classList.add('vis'); growSpine(); syncDots(); }
  });
},{threshold:0.22});
document.querySelectorAll('.ev').forEach(e=>io.observe(e));

function growSpine(){
  const vis=[...document.querySelectorAll('.ev.vis')];
  if(!vis.length) return;
  const last=vis[vis.length-1];
  const dot=last.querySelector('.dot');
  const wt=tl.getBoundingClientRect().top+window.scrollY;
  const dt=dot.getBoundingClientRect().top+window.scrollY;
  sf.style.height=Math.max(0,dt-wt+9)+'px';
}

function syncDots(){
  const ids=[...document.querySelectorAll('.ev.vis')].map(e=>e.id.replace('ev-',''));
  document.querySelectorAll('.nd').forEach(d=>{
    const ev=EVENTS.find(e=>e.id===d.dataset.id);
    const on=ids.includes(d.dataset.id);
    d.classList.toggle('on',on);
    d.style.background=on?(ev?.color||'#00d4f5'):'';
    d.style.borderColor=on?(ev?.color||'#00d4f5'):'';
    d.style.boxShadow=on?`0 0 10px ${ev?.color||'#00d4f5'}`:'';
  });
}

window.addEventListener('scroll',()=>{
  growSpine();
  document.getElementById('pb').style.width=
    (window.scrollY/(document.body.scrollHeight-window.innerHeight)*100)+'%';
},{passive:true});

// ═══════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════
document.getElementById('filters').addEventListener('click',e=>{
  const p=e.target.closest('.fp'); if(!p) return;
  document.querySelectorAll('.fp').forEach(x=>{
    x.classList.remove('act');
    x.style.background=''; x.style.color='';
    const c=ERA_COLORS[x.dataset.e];
    x.style.borderColor=c?c+'60':'';
  });
  p.classList.add('act');
  const era=p.dataset.e;
  const c=ERA_COLORS[era]||'#00d4f5';
  p.style.background=c; p.style.color='#030c18'; p.style.borderColor=c;
  document.querySelectorAll('.ev').forEach(ev=>{
    const match=era==='all'||ev.dataset.era===era;
    ev.style.opacity=match?'':'0.12';
    ev.style.filter=match?'':'grayscale(1) blur(1px)';
  });
});

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
const mbg=document.getElementById('mbg');

function openModal(ev){
  // swap SVG
  document.getElementById('mill').innerHTML=ILLS[ev.ill];
  document.getElementById('mill').setAttribute('viewBox','0 0 660 200');
  const illSvg=document.getElementById('mill');
  // scale up the illustration viewBox for modal
  document.getElementById('mill').style.height='200px';

  document.getElementById('myr').textContent=ev.year;
  const chip=document.getElementById('mchip');
  chip.textContent=ev.era; chip.style.background=ev.color; chip.style.color='#030c18';
  document.getElementById('macc').style.background=ev.color;
  const title=document.getElementById('mtitle');
  title.textContent=ev.title; title.style.color=ev.color;
  document.getElementById('mtext').innerHTML=ev.full;
  mbg.classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  mbg.classList.remove('open');
  document.body.style.overflow='';
}

document.getElementById('cbtn').addEventListener('click',closeModal);
mbg.addEventListener('click',e=>{ if(e.target===mbg) closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

// ═══════════════════════════════════════════
// PARTICLE SYSTEM
// ═══════════════════════════════════════════
const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');
let W,H;
function resize(){ W=cvs.width=innerWidth; H=cvs.height=innerHeight; }
window.addEventListener('resize',resize); resize();

const PCOLORS=['#00d4f5','#7de8f7','#ffd166','#06d6a0','#f72585','#90e0ef'];
class P{
  constructor(){ this.init(true); }
  init(rand){
    this.x=Math.random()*W;
    this.y=rand?Math.random()*H:H+4;
    this.vy=-(Math.random()*.4+.08);
    this.vx=(Math.random()-.5)*.18;
    this.r=Math.random()*1.3+.2;
    this.maxL=Math.random()*280+120;
    this.l=rand?Math.random()*this.maxL:0;
    this.color=PCOLORS[Math.floor(Math.random()*PCOLORS.length)];
  }
  step(){ this.x+=this.vx; this.y+=this.vy; this.l++; if(this.l>this.maxL||this.y<-4) this.init(false); }
  draw(){
    const t=this.l/this.maxL;
    const a=t<.1?t*10*.45:t>.8?(1-t)*5*.45:.45;
    const hex=Math.floor(a*255).toString(16).padStart(2,'0');
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=this.color+hex; ctx.fill();
  }
}
const pts=[]; for(let i=0;i<90;i++) pts.push(new P());
(function loop(){ ctx.clearRect(0,0,W,H); pts.forEach(p=>{p.step();p.draw();}); requestAnimationFrame(loop); })();

// ═══════════════════════════════════════════
// INITIAL REVEAL
// ═══════════════════════════════════════════
setTimeout(()=>{
  document.querySelectorAll('.ev').forEach((e,i)=>{
    if(e.getBoundingClientRect().top < innerHeight*.95){
      setTimeout(()=>{ e.classList.add('vis'); growSpine(); syncDots(); },i*140);
    }
  });
},700);
</script>
